services:
  api:
    build: .
    container_name: notes-api-migrator
    restart: always
    ports:
      - "5300:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ConnectionStrings__NotesConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    networks:
      - notesapplication_default
networks:
  notesapplication_default:
    external: true
    name: notesapplication_notesapplication_default
      


